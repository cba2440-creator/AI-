services:
  - type: web
    name: ai-promotion-awards-voting
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: voting-data
      mountPath: /var/data/ai-promotion-awards
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data/ai-promotion-awards
