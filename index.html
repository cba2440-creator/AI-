<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 AI 영상 어워드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="employee-page">
  <div id="vote-toast" class="admin-toast" aria-live="polite"></div>

  <div id="description-modal" class="modal" hidden>
    <div class="modal__backdrop" data-close-modal="true"></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button id="modal-close" class="modal__close" type="button" aria-label="닫기">×</button>
      <div class="modal__eyebrow">출품작 상세 설명</div>
      <h2 id="modal-title" class="modal__title"></h2>
      <div id="modal-description" class="modal__description"></div>
    </div>
  </div>

  <div class="page-shell">
    <header class="hero hero--employee">
      <nav class="topbar">
        <img class="brandmark" src="logo.png" alt="IPARK MALL 로고">
      </nav>
    </header>

    <main class="layout layout--employee">
      <aside class="sidebar">
        <section class="intro-block">
          <div class="hero__badge hero__badge--light">AI PROMOTION AWARDS 2026</div>
          <h1>2026 AI 영상 어워드</h1>
          <div class="hero__text-group">
            <p class="hero__text">가장 인상 깊은 작품에 신중한 투표바랍니다.</p>
            <p class="hero__text hero__text--sub">(최초 1회 투표 제출 후 변경 불가)</p>
          </div>
          <div class="hero__meta hero__meta--light">
            <div>
              <span class="meta__label">투표 대상</span>
              <strong>전 직원</strong>
            </div>
            <div>
              <span class="meta__label">투표 방식</span>
              <strong>1인 최대 3표</strong>
            </div>
          </div>
        </section>

        <section class="panel panel--form panel--form-sticky">
          <div class="panel__heading">
            <h2>투표 진행</h2>
          </div>

          <form id="vote-form" class="vote-form">
            <label>
              <span>사원번호</span>
              <input id="employee-number" name="employeeNumber" type="text" autocomplete="off" required>
            </label>

            <label>
              <span>비밀번호</span>
              <input id="employee-password" name="employeePassword" type="password" inputmode="numeric" maxlength="4" autocomplete="off" required>
            </label>

            <label>
              <span>이름</span>
              <input id="voter-name" name="voterName" type="text" readonly tabindex="-1">
            </label>

            <label>
              <span>투표 작품 선택</span>
              <div id="selected-video" class="vote-selects" role="group" aria-label="투표 작품 선택">
                <select id="selected-video-1" class="vote-select" aria-label="첫 번째 투표 작품"></select>
                <select id="selected-video-2" class="vote-select" aria-label="두 번째 투표 작품"></select>
                <select id="selected-video-3" class="vote-select" aria-label="세 번째 투표 작품"></select>
              </div>
            </label>

            <button id="submit-button" type="submit" class="button button--primary">투표 제출</button>
          </form>

          <div id="vote-status" class="status-card status-card--centered" aria-live="polite"></div>
        </section>
      </aside>

      <section class="content-rail">
        <section class="shelf">
          <div class="shelf__header">
            <div>
              <h2>출품 영상</h2>
            </div>
          </div>
          <div id="video-grid" class="video-grid video-grid--shelf"></div>
        </section>
      </section>
    </main>
  </div>

  <template id="video-card-template">
    <article class="video-card">
      <div class="video-card__media"></div>
      <div class="video-card__body">
        <div class="video-card__topline"></div>
        <h3></h3>
        <p class="video-card__description"></p>
        <div class="video-card__footer">
          <div class="video-card__actions">
            <button class="button button--ghost button--small video-card__more" type="button">더보기</button>
            <a class="button button--small" target="_blank" rel="noreferrer">유튜브로 보기</a>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
